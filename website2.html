<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Management Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  background: rgba(0,0,0,0.5);
  box-shadow: 0 0 20px cyan;
}

/* Dashboard */
.dashboard {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
}

.card {
  padding: 15px;
  border-radius: 10px;
  background: rgba(0,0,0,0.5);
  box-shadow: 0 0 10px cyan;
}

/* Form */
.form-section {
  text-align: center;
  padding: 20px;
}

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: cyan;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: magenta;
  color: white;
}

/* Room Grid */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.room {
  width: 260px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 15px rgba(0,255,255,0.4);
  transition: 0.3s;
}

.room:hover {
  transform: scale(1.05);
}

.available { color: lightgreen; }
.booked { color: red; }

/* Booking Table */
table {
  width: 90%;
  margin: 20px auto;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  text-align: center;
}

/* Footer */
.footer {
  text-align: center;
  padding: 10px;
  color: cyan;
  text-shadow: 0 0 8px cyan;
}
</style>
</head>

<body>

<header>🏨 Hotel Management Pro</header>

<div class="dashboard">
  <div class="card">Total Rooms: <span id="totalRooms"></span></div>
  <div class="card">Available: <span id="availableRooms"></span></div>
  <div class="card">Booked: <span id="bookedRooms"></span></div>
  <div class="card">Revenue: ₹<span id="revenue"></span></div>
</div>

<div class="form-section">
  <input type="text" id="guestName" placeholder="Guest Name">
  <input type="number" id="roomNumber" placeholder="Room Number">
  <input type="date" id="checkIn">
  <input type="date" id="checkOut">
  <button onclick="bookRoom()">Book Room</button>
</div>

<div class="container" id="rooms"></div>

<h2 style="text-align:center;">📋 Booking Records</h2>
<table>
  <thead>
    <tr>
      <th>Guest</th>
      <th>Room</th>
      <th>Days</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody id="records"></tbody>
</table>

<div class="footer">
  <p>&copy; Radhamita</p>
</div>

<script>
const rooms = [
  { number: 101, type: "Single", price: 1000, booked: false },
  { number: 102, type: "Double", price: 1500, booked: false },
  { number: 103, type: "Deluxe", price: 2000, booked: false },
  { number: 104, type: "Suite", price: 3000, booked: false },
  { number: 105, type: "Luxury", price: 5000, booked: false }
];

let bookings = [];
let totalRevenue = 0;

function updateDashboard() {
  document.getElementById("totalRooms").textContent = rooms.length;
  document.getElementById("availableRooms").textContent =
    rooms.filter(r => !r.booked).length;
  document.getElementById("bookedRooms").textContent =
    rooms.filter(r => r.booked).length;
  document.getElementById("revenue").textContent = totalRevenue;
}

function displayRooms() {
  const container = document.getElementById("rooms");
  container.innerHTML = "";

  rooms.forEach(room => {
    const div = document.createElement("div");
    div.className = "room";

    div.innerHTML = `
      <h3>Room ${room.number}</h3>
      <p>Type: ${room.type}</p>
      <p>₹${room.price}/night</p>
      <p class="${room.booked ? 'booked' : 'available'}">
        ${room.booked ? 'Booked' : 'Available'}
      </p>
      <button onclick="toggleRoom(${room.number})">
        ${room.booked ? 'Checkout' : 'Quick Book'}
      </button>
    `;

    container.appendChild(div);
  });
}

function bookRoom() {
  const name = document.getElementById("guestName").value;
  const number = parseInt(document.getElementById("roomNumber").value);
  const checkIn = new Date(document.getElementById("checkIn").value);
  const checkOut = new Date(document.getElementById("checkOut").value);

  const room = rooms.find(r => r.number === number);

  if (!name || !room || !checkIn || !checkOut) {
    alert("Fill all details!");
    return;
  }

  if (room.booked) {
    alert("Room already booked!");
    return;
  }

  const days = (checkOut - checkIn) / (1000 * 60 * 60 * 24);
  const amount = days * room.price;

  room.booked = true;
  totalRevenue += amount;

  bookings.push({ name, number, days, amount });

  updateRecords();
  displayRooms();
  updateDashboard();
}

function updateRecords() {
  const table = document.getElementById("records");
  table.innerHTML = "";

  bookings.forEach(b => {
    const row = `<tr>
      <td>${b.name}</td>
      <td>${b.number}</td>
      <td>${b.days}</td>
      <td>₹${b.amount}</td>
    </tr>`;
    table.innerHTML += row;
  });
}

function toggleRoom(number) {
  const room = rooms.find(r => r.number === number);
  room.booked = false;
  displayRooms();
  updateDashboard();
}

displayRooms();
updateDashboard();
</script>

</body>
</html>
